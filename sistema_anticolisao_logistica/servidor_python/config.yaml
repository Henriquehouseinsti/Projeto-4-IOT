# Central configuration for sistema_anticolisao_logistica
# (IPs, thresholds, scales)

# ==============================================================================
# CONFIGURAÇÃO CENTRAL - SISTEMA ANTICOLISÃO LOGÍSTICA
# ==============================================================================

# 1. Configurações de Comunicação MQTT (Módulo comms)
mqtt:
  broker: "localhost"                 # IP do Broker MQTT (mude para o IP do seu ThingsBoard/Mosquitto)
  port: 1883                          # Porta padrão do MQTT (sem criptografia para testes)
  client_id: "servidor_python_core"   # Identificador exclusivo do servidor no Broker
  username: "TOKEN_DISPOSITIVO_ESP"   # Usuário ou Access Token (caso use o ThingsBoard)
  password: null                      # Senha (se houver)
  keepalive: 60
  topics:
    alerts: "logistica/alerta"        # Tópico para publicar alertas críticos de batida (QoS 1)
    heartbeat: "logistica/heartbeat"  # Tópico para publicar o "ok" a cada 200ms (QoS 0)

# 2. Fonte de Captura de Vídeo (Módulo core/camera_stream)
camera:
  source: "http://192.168.15.108:81/stream"  # IP estático da ESP32-CAM (definido em cliente_esp32_cam/include/config.h)
  max_reconnect_tries: 10             # Tentativas automáticas de reconexão se a rede cair
  reconnect_delay: 1.0                # Tempo de espera (em segundos) entre tentativas

# 3. Parâmetros da Rede Neural e Rastreamento (Módulo core/perception)
perception:
  model_path: "weights/yolo11_carrinho.pt" # Modelo treinado com dataset customizado do carrinho
  confidence_threshold: 0.30          # Limiar mínimo de certeza para detectar empilhadeiras/pedestres
  iou_threshold: 0.45                 # Limiar do NMS para eliminar caixas duplicadas do mesmo objeto
  device: "cpu"                       # Dispositivo de hardware ("cpu" ou "cuda" se tiver GPU dedicada)

# 4. Cinemática e Calibração de Solo (Módulo core/kinematics)
kinematics:
  dt: 0.033                           # Passo de tempo estimado por quadro (0.033s = alvo de 30 FPS)
  
  # Matriz de Homografia 3x3 (Mapeamento Geométrico de Pixel para Metros)
  # IMPORTANTE: Vocês devem calibrar esses números na Poli usando o cv2.getPerspectiveTransform()
  homography_matrix:
    - [0.005, -0.001,  0.2]           # Linha 1
    - [0.001,  0.006, -1.5]           # Linha 2
    - [0.0,    0.0,    1.0]           # Linha 3

# 5. Motor de Avaliação de Risco e Alarme (Módulo core/risk_engine)
risk_engine:
  ttc_threshold: 1.5                  # Limiar de Time-to-Collision (segundos). Se menor que isso, dispara o freio!
  default_vehicle_width: 1.6          # Largura padrão aproximada da empilhadeira (metros)
  default_vehicle_length: 2.8         # Comprimento padrão aproximado da empilhadeira (metros)
  safety_margin_meters: 0.5           # Margem de segurança extra (zona de amortecimento) ao redor da máquina

# 6. Monitoramento e Interface Local (Módulo utils)
visualizer:
  show_window: true                   # Define se abre a janela gráfica do OpenCV (imshow) no VS Code
  window_name: "Servidor ADAS - Logistica Poli-USP"